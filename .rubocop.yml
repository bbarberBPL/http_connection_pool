plugins:
  - rubocop-performance
  - rubocop-rake
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - "*.gemspec"

# ── Style ──────────────────────────────────────────────────────────────────
Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Style/Documentation:
  Enabled: false

# ── Metrics ────────────────────────────────────────────────────────────────
Metrics/MethodLength:
  Max: 20

Metrics/ClassLength:
  Max: 150

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

# ── RSpec ──────────────────────────────────────────────────────────────────
RSpec/MultipleExpectations:
  Max: 3

RSpec/ExampleLength:
  Max: 20

# Integration specs and the thread-safety and fiber suites describe cross-cutting
# behaviour rather than a single class, so a string description is appropriate there.
RSpec/DescribeClass:
  Exclude:
    - "spec/integration/**/*"
    - "spec/http_connection_pool/thread_safety_spec.rb"
    - "spec/http_connection_pool/fiber_spec.rb"
